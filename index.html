        var labelText = date;
        // 判断是否今天
        var today = new Date().toISOString().slice(0, 10);
        if (date === today) {
            labelText = '📌 今日热点 · ' + date;
        }

        group.innerHTML =
            '<div class="date-header">' +
            '<span class="date-label">' + escHtml(labelText) + '</span>' +
            '<span class="date-count">' + newsList.length + ' 条资讯</span>' +
            '</div>' +
            '<div class="news-grid" id="grid-' + date + '"></div>';

        container.appendChild(group);

        var grid = document.getElementById('grid-' + date);
        newsList.forEach(function(item) {
            var card = document.createElement('a');
            card.className = 'news-card';
            card.href = item.url || '#';
            card.target = '_blank';
            card.rel = 'noopener';
            card.innerHTML =
                '<div class="meta">' +
                '<span class="tag">' + escHtml(item.tag || '智能制造') + '</span>' +
                '<span class="source">' + escHtml(item.source || '') + '</span>' +
                '</div>' +
                '<h3>' + escHtml(item.title) + '</h3>' +
                '<p>' + escHtml(item.summary || '') + '</p>';
            grid.appendChild(card);
        });
    });
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
</body>
</html>
