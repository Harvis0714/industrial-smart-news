function escHtml(s) {

}

function getTagClass(tag) {

        '政策动态': 'tag-policy',

        '重大装备': 'tag-equip',
        '产业趋势': 'tag-trend'
    };
    return m[tag] || 'tag-tech';
}

function renderNews() {

        html += '<div class="date-label">' + escHtml(date) + '</div>';
        for (var i = 0; i < articles.length; i++) {

            html += '<span class="tag ' + getTagClass(a.tag) + '">' + escHtml(a.tag) + '</span>';
