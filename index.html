document.getElementById('updateTime').textContent = UPDATE_TIME || '--';

var container = document.getElementById('newsContainer');

if (!NEWS_BY_DATE || Object.keys(NEWS_BY_DATE).length === 0) {
    container.innerHTML =
        '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">' +
        '<div style="font-size:40px;margin-bottom:12px;">📡</div>' +
        '<p>数据加载中，每日定时抓取工业智能制造最新资讯...</p></div>';
} else {
    // 按日期倒序排列
    var dates = Object.keys(NEWS_BY_DATE).sort(function(a, b) { return b.localeCompare(a); });

    dates.forEach(function(date) {
        var newsList = NEWS_BY_DATE[date];
        if (!newsList || newsList.length === 0) return;

        var group = document.createElement('div');
        group.className = 'date-group';

        var labelText = date;
        // 判断是否今天
        var today = new Date().toISOString().slice(0, 10);
        if (date === today) {
            labelText = '📌 今日热点 · ' + date;
        }

        group.innerHTML =
            '<div class="date-header">' +
            '<span class="date-label">' + escHtml(labelText) + '</span>' +
            '<span class="date-count">' + newsList.length + ' 条资讯</span>' +
            '</div>' +
            '<div class="news-grid" id="grid-' + date + '"></div>';

        container.appendChild(group);

        var grid = document.getElementById('grid-' + date);
        newsList.forEach(function(item) {
            var card = document.createElement('a');
            card.className = 'news-card';
            card.href = item.url || '#';
            card.target = '_blank';
            card.rel = 'noopener';
            card.innerHTML =
                '<div class="meta">' +
                '<span class="tag">' + escHtml(item.tag || '智能制造') + '</span>' +
                '<span class="source">' + escHtml(item.source || '') + '</span>' +
                '</div>' +
                '<h3>' + escHtml(item.title) + '</h3>' +
                '<p>' + escHtml(item.summary || '') + '</p>';
            grid.appendChild(card);
        });
    });
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
